<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#04040a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0f0f7" media="(prefers-color-scheme: light)">
<title>PACEcalc</title>
<!-- Favicon & app icons -->
<link rel="icon" type="image/x-icon"    href="favicon/favicon.ico">
<link rel="icon" type="image/svg+xml"   href="favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
<link rel="apple-touch-icon"            href="favicon/apple-touch-icon.png">
<link rel="manifest"                    href="favicon/site.webmanifest">
<meta name="theme-color"               content="#04040a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#e8152a;--blue:#0070f3;--tr:all .35s cubic-bezier(0.4,0,0.2,1)}

[data-theme="dark"]{
  --bg:#08080f;      /* single dark bg used everywhere */
  --card:#12121e;    /* cards sit just above bg */
  --card2:#181828;
  --brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.04);
  --txt:#eeeef8;--txt2:#9898c0;--dim:#5555a0;--dim2:#1c1c30;
  --shadow:rgba(0,0,0,0.8);--num:#ffffff;
  --bar-bg:rgba(255,255,255,0.07);
  --adj-bg:rgba(255,255,255,0.05);--adj-brd:rgba(255,255,255,0.08);--adj-txt:rgba(255,255,255,0.4);
  --row-brd:rgba(255,255,255,0.05);--tog-off:#202038;
  --glow-r:rgba(232,21,42,0.10);--glow-b:rgba(0,112,243,0.10);
  --dl-bg:#0f0f1c;   /* finish times rows, slightly lighter than bg */
}
[data-theme="light"]{
  --bg:#f4f4f8;      /* single light bg used everywhere */
  --card:#ffffff;    /* white cards */
  --card2:#f0f0f6;
  --brd:rgba(0,0,0,0.08);--brd2:rgba(0,0,0,0.04);
  --txt:#0a0a18;--txt2:#3a3a58;--dim:#9090b8;--dim2:#d4d4e4;
  --shadow:rgba(0,0,0,0.07);--num:#08081a;
  --bar-bg:rgba(0,0,0,0.07);
  --adj-bg:rgba(0,0,0,0.04);--adj-brd:rgba(0,0,0,0.09);--adj-txt:rgba(0,0,0,0.4);
  --row-brd:rgba(0,0,0,0.06);--tog-off:#c8c8d8;
  --glow-r:rgba(232,21,42,0.05);--glow-b:rgba(0,112,243,0.05);
  --dl-bg:#ffffff;
}

/* Fill full screen, dark bg everywhere including status bar */
html{min-height:100%;background:var(--bg);transition:background .3s}
body{
  min-height:100%;
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  /* No max-width, no flex, no overflow:hidden — single natural scroll */
  transition:background .3s,color .3s;
}

/* bg-layer removed — single solid bg ensures consistency */

/* HEADER */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 18px 10px;background:var(--bg)}
.logo-wrap{display:flex;align-items:center;position:relative}
.logo-img{
  height:32px;width:auto;display:block;
  transition:opacity .6s cubic-bezier(0.4,0,0.2,1), transform .6s cubic-bezier(0.4,0,0.2,1);
}

/* mix-blend-mode makes the solid PNG background disappear into the page */
/* Dark mode: logo-dark.png has dark bg → screen blends dark away, keeps bright pixels */
[data-theme="dark"] .logo-for-dark {
  mix-blend-mode: screen;
  opacity:1; transform:scale(1); pointer-events:auto;
}
/* Light mode: logo-light.png has white/light bg → multiply blends white away, keeps dark pixels */
[data-theme="light"] .logo-for-light {
  mix-blend-mode: multiply;
  opacity:1; transform:scale(1); pointer-events:auto;
}

/* Hidden state for the non-active logo */
[data-theme="dark"]  .logo-for-light {
  opacity:0; transform:scale(0.9);
  pointer-events:none; position:absolute; left:0;
}
[data-theme="light"] .logo-for-dark {
  opacity:0; transform:scale(0.9);
  pointer-events:none; position:absolute; left:0;
}

/* Dark mode: show dark-mode logo, hide light-mode logo */
[data-theme="dark"]  .logo-for-dark  { display:block; }
[data-theme="dark"]  .logo-for-light { display:none;  }

/* Light mode: show light-mode logo, hide dark-mode logo */
[data-theme="light"] .logo-for-dark  { display:none;  }
[data-theme="light"] .logo-for-light { display:block; }

/* FALLBACK: if logo-light.png is missing, show logo.png with CSS filter in light mode */
[data-theme="light"] .logo-for-light { display:block; }
[data-theme="light"] .logo-for-dark.fallback { display:block; filter:invert(1); }
.hbtns{display:flex;gap:8px}
.hbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--brd);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:15px;overflow:hidden;box-shadow:0 1px 6px var(--shadow);transition:var(--tr)}
.hbtn:hover{border-color:var(--dim)}

/* VALUE CARDS */
.cards{
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:20;
  padding:10px 14px;
  padding-bottom:max(16px, calc(10px + env(safe-area-inset-bottom)));
  background:var(--bg);
  border-top:1px solid var(--brd);
  box-shadow:0 -16px 48px var(--shadow);
  transition:background .35s cubic-bezier(0.4,0,0.2,1), border-color .35s;
}
.vcard{position:relative;overflow:hidden;border-radius:18px;border:1px solid var(--brd);background:var(--card);padding:14px 16px 12px;user-select:none;touch-action:pan-y;box-shadow:0 2px 14px var(--shadow);transition:var(--tr);cursor:ew-resize}
.vcard::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;border-radius:22px}
.vcard.pace::before{background:radial-gradient(ellipse 130% 130% at 20% 50%,var(--glow-r) 0%,transparent 65%)}
.vcard.speed::before{background:radial-gradient(ellipse 130% 130% at 80% 50%,var(--glow-b) 0%,transparent 65%)}
.vcard.dragging::before{opacity:1}
.vcard.pressing{transform:scale(0.99);opacity:0.9}
.vcard.pace.dragging{border-color:rgba(232,21,42,.28);box-shadow:0 4px 28px rgba(232,21,42,.12)}
.vcard.speed.dragging{border-color:rgba(0,112,243,.28);box-shadow:0 4px 28px rgba(0,112,243,.12)}

.vc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.vc-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase}
.vcard.pace  .vc-label{color:var(--red)}
.vcard.speed .vc-label{color:var(--blue)}
.vc-hint{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;font-weight:500}
.hint-arr{width:17px;height:17px;border-radius:5px;border:1px solid var(--brd);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim)}
.hold-hint{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:.2px;opacity:.7}

.vc-number{font-size:60px;font-weight:900;line-height:1;letter-spacing:-3px;color:var(--num);font-variant-numeric:tabular-nums;transition:transform .15s cubic-bezier(0.34,1.56,0.64,1),color .3s;display:inline-block}
.vc-number.bump{transform:scale(1.05)}
.vc-number.bump-down{transform:scale(0.96)}

.vc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
/* Pace number + km/t side by side */
.vc-num-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.vc-kmh-aside{text-align:right;flex-shrink:0;align-self:center}
.vc-kmh-val{font-size:32px;font-weight:700;color:var(--txt2);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1;transition:color .3s}
.vc-kmh-unit{font-size:11px;color:var(--dim);font-weight:500;margin-top:3px}
.vc-unit{font-size:13px;color:var(--dim);font-weight:500}
.live-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;opacity:0;transition:opacity .3s;background:rgba(0,112,243,.1);color:#4a9eff;border:1px solid rgba(0,112,243,.2)}
.live-badge.visible{opacity:1}

.vc-bar{height:3px;background:var(--bar-bg);border-radius:2px;margin-top:8px;overflow:hidden;display:flex;}
.vc-bar-fill{height:100%;border-radius:2px;width:0%;transition:width .06s linear}
/* Pace bar fills from the right (fast = right side) matching swipe-left-to-go-faster */
.vcard.pace  .vc-bar-fill{background:linear-gradient(to left,rgba(232,21,42,.5),var(--red));margin-left:auto}
.vcard.speed .vc-bar-fill{background:linear-gradient(to right,rgba(0,112,243,.5),var(--blue))}

.vc-adjust{display:flex;gap:5px;margin-top:6px}
.adj-btn{flex:1;padding:8px 4px;border-radius:11px;border:1px solid var(--adj-brd);background:var(--adj-bg);color:var(--adj-txt);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr),transform .1s;min-height:38px;display:flex;align-items:center;justify-content:center}
.adj-btn:hover{background:var(--card2);color:var(--txt)}
.adj-btn:active{transform:scale(.93)}

/* FINISH TIMES */
.scroll-area{position:relative;z-index:10;background:var(--bg);transition:background .3s;padding-bottom:40px}
.scroll-area::-webkit-scrollbar{display:none}
.ft-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
.ft-title{font-size:15px;font-weight:700;color:var(--txt)}
.ft-edit-btn{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);background:var(--card2);border:1px solid var(--brd);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr)}
.ft-edit-btn:hover{color:var(--txt);border-color:var(--dim)}
.dist-list{padding:0 14px 280px}
.dl-wrap{background:var(--dl-bg);border-radius:16px;overflow:hidden;margin-bottom:28px;border:1px solid var(--brd);box-shadow:0 2px 12px var(--shadow);transition:var(--tr)}
.dr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--row-brd);transition:var(--tr)}
.dr:last-child{border-bottom:none}
.dr-name{font-size:15px;font-weight:500;color:var(--txt2)}
.dr-sub{font-size:11px;color:var(--dim);margin-top:1px}
.dr-right{display:flex;align-items:center;gap:8px}
.dr-time{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--txt);min-width:72px;text-align:right;transition:color .3s}
.dr-arr{color:var(--dim2);font-size:14px}

/* BOTTOM SHEETS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:430px;border:1px solid var(--brd);border-bottom:none;animation:up .3s cubic-bezier(.22,1,.36,1);transition:background .3s,border-color .3s;max-height:90vh;display:flex;flex-direction:column}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-hd{padding:16px 20px 0;flex-shrink:0}
.handle{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:20px;font-weight:700;color:var(--txt);margin-bottom:4px}
.sheet-sub{color:var(--dim);font-size:13px;margin-bottom:16px}
.sheet-body{padding:0 20px 44px;overflow-y:auto;flex:1}
.sheet-body::-webkit-scrollbar{display:none}

/* Input modal (long press) */
#inputOverlay .sheet{border-radius:24px 24px 0 0}
.input-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
#inputType.pace  .input-label{color:var(--red)}
#inputType.speed .input-label{color:var(--blue)}
.input-field{width:100%;background:var(--card2);border:2px solid var(--brd);border-radius:16px;padding:16px 20px;font-size:44px;font-weight:700;color:var(--txt);text-align:center;font-variant-numeric:tabular-nums;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s;letter-spacing:-1px}
.input-field:focus{border-color:var(--blue)}
#inputType.pace .input-field:focus{border-color:var(--red)}
.input-hint{font-size:12px;color:var(--dim);text-align:center;margin-top:8px;margin-bottom:16px}
.input-ok{width:100%;padding:15px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr);margin-bottom:8px}
#inputType.pace  .input-ok{background:var(--red);color:#fff}
#inputType.speed .input-ok{background:var(--blue);color:#fff}
.input-cancel{width:100%;padding:13px;background:transparent;border:1px solid var(--brd);border-radius:14px;color:var(--dim);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}

/* Auth / settings elements */
.auth-btn{display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;border-radius:13px;border:1px solid var(--brd);background:var(--card2);color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:'Inter',sans-serif;transition:var(--tr);min-height:52px}
.auth-btn:hover{border-color:var(--dim)}
.auth-btn svg{width:20px;height:20px;flex-shrink:0}
.sheet-close{width:100%;padding:13px;background:transparent;border:1px solid var(--brd);border-radius:13px;color:var(--dim);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;min-height:48px;transition:var(--tr)}
.profile-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card2);border-radius:13px;border:1px solid var(--brd);margin-bottom:14px;transition:var(--tr)}
.pav{width:46px;height:46px;border-radius:50%;background:var(--dim2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--txt);font-size:18px;flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;object-fit:cover}
.pn{font-weight:600;font-size:15px;color:var(--txt)}
.pe{font-size:12px;color:var(--dim);margin-top:2px}
.signout{display:block;width:100%;padding:13px;background:transparent;border:1px solid rgba(232,21,42,.3);border-radius:13px;color:#ff4d6d;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;min-height:48px;margin-top:4px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--row-brd)}
.srow:last-child{border-bottom:none}
.srow-label{font-size:15px;font-weight:500;color:var(--txt)}
.seg-ctrl{display:flex;background:var(--card2);border-radius:10px;padding:3px;gap:3px;border:1px solid var(--brd)}
.seg{padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr);min-height:36px}
.seg.active{background:var(--card);color:var(--txt);border:1px solid var(--brd);box-shadow:0 1px 4px var(--shadow)}
.tog{position:relative;width:44px;height:26px;flex-shrink:0}
.tog input{display:none}
.tog-track{position:absolute;inset:0;background:var(--tog-off);border-radius:13px;cursor:pointer;transition:background .22s}
.tog-track::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .22s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog input:checked+.tog-track{background:var(--blue)}
.tog input:checked+.tog-track::after{transform:translateX(18px)}
.dtog-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--row-brd)}
.dtog-row:last-child{border-bottom:none}
.dtog-name{font-size:15px;font-weight:500;color:var(--txt)}
.dtog-sub{font-size:11px;color:var(--dim);margin-top:2px}

/* ── FIXED BOTTOM SPEED BAR ── */
.speed-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:50;
  background:var(--card);
  border-top:1px solid var(--brd);
  padding:12px 20px calc(12px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px var(--shadow);
  transition:var(--tr);
}
.sb-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  max-width:600px;
  margin:0 auto;
}
.sb-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--blue);
  margin-bottom:6px;
}
.sb-center{
  text-align:center;
  flex-shrink:0;
}
.sb-value{
  font-size:44px;font-weight:900;line-height:1;
  letter-spacing:-2px;color:var(--num);
  font-variant-numeric:tabular-nums;
  transition:transform .15s cubic-bezier(0.34,1.56,0.64,1), color .3s;
}
.sb-value.bump      { transform:scale(1.08); }
.sb-value.bump-down { transform:scale(0.94); }
.sb-unit{
  font-size:11px;color:var(--dim);font-weight:500;
  margin-top:3px;letter-spacing:.5px;
}
.sb-left,.sb-right{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;
}
.sb-adjust{display:flex;gap:6px;}
.sb-btn{
  padding:9px 14px;border-radius:10px;
  border:1px solid var(--adj-brd);background:var(--adj-bg);
  color:var(--adj-txt);font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:var(--tr),transform .1s;min-height:40px;
}
.sb-btn:hover{background:var(--card2);color:var(--txt);}
.sb-btn:active{transform:scale(.91);}

/* Extra space at bottom so content doesn't hide behind speed bar */
.scroll-area{padding-bottom:100px!important;}

.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);color:var(--txt);padding:11px 20px;border-radius:30px;border:1px solid var(--brd);font-size:14px;z-index:300;transition:all .3s;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>


<header>
  <div class="logo-wrap">
    <img src="logo-dark.png"  class="logo-img logo-for-dark"  alt="PACEcalc">
    <img src="logo-light.png" class="logo-img logo-for-light" alt="PACEcalc">
  </div>
  <div class="hbtns">
    <button class="hbtn" id="langBtn" onclick="toggleLang()" title="Language">🇳🇴</button>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <button class="hbtn" id="userBtn" onclick="openUserSheet()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </button>
  </div>
</header>

<div class="cards">
  <div class="vcard pace" id="paceCard">
    <div class="vc-top">
      <span class="vc-label" data-i18n="pace">Tempo</span>
      <div class="vc-hint"><div class="hint-arr">‹</div><div class="hint-arr">›</div>&nbsp;<span data-i18n="drag">dra for å justere</span></div>
    </div>
    <div class="vc-num-row">
      <div>
        <div class="vc-number" id="paceNum">5:00</div>
        <div class="vc-bottom"><span class="vc-unit" data-i18n="paceUnit">min / km</span></div>
      </div>
      <div class="vc-kmh-aside">
        <div class="vc-kmh-val" id="kmhDisplay">12.0</div>
        <div class="vc-kmh-unit" data-i18n="speedUnit">km / t</div>
      </div>
    </div>
    <div class="vc-bar"><div class="vc-bar-fill" id="paceBar"></div></div>
    <div class="vc-adjust">
      <button class="adj-btn" onclick="adjustPace(-10)">−10s</button>
      <button class="adj-btn" onclick="adjustPace(-1)">−1s</button>
      <button class="adj-btn" onclick="adjustPace(1)">+1s</button>
      <button class="adj-btn" onclick="adjustPace(10)">+10s</button>
    </div>
  </div>
</div>

<div class="scroll-area">
  <div class="ft-header">
    <div class="ft-title" data-i18n="finishTimes">Finish Times</div>
    <button class="ft-edit-btn" onclick="openDistSheet()" data-i18n="edit">Rediger</button>
  </div>
  <div class="dist-list">
    <div class="dl-wrap" id="distListWrap"></div>
  </div>
</div>

// ═══ localStorage ═════════════════════════════
function lsGet(k){try{const v=localStorage.getItem('pc_'+k);return v!=null?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem('pc_'+k,JSON.stringify(v));}catch(e){}}

// Restore all state from localStorage FIRST (before Firebase, before DOM)
(()=>{
  const t=lsGet('theme');   if(t!=null)  theme=t;

// ═══ SAVE / LOAD ══════════════════════════════
function saveData(d){
  // Always write to localStorage as immediate cache
  for(const k in d) lsSet(k, d[k]);
  // For logged-in users: Firebase is the real storage
  if(curUser && fbOk){
    db.collection('users').doc(curUser.uid)
      .set(d, {merge:true})
      .catch(e => console.warn('Firebase save error:', e));
  }
}
function loadSettings(u){
  db.collection('users').doc(u.uid).get().then(doc=>{
    if(!doc.exists) return;
    const d=doc.data();
    let changed=false;

    // Apply Firebase values and sync them to localStorage cache on this device
    if(d.theme   !=null){ theme=d.theme;            lsSet('theme',   d.theme);    changed=true; }
    if(d.lang    !=null){ lang=d.lang;              lsSet('lang',    d.lang);     changed=true; }

    if(changed){

      setPace(paceSec, false);
    }
  }).catch(e => console.warn('Firebase load error:', e));
}

function applyTheme(t,save=true){
  theme=t;

  const mc=document.createElement('meta');
  mc.name='theme-color';
  mc.content=t==='dark'?'#04040a':'#f0f0f7';
  document.head.appendChild(mc);
  if(save)saveData({theme});
}
function toggleTheme(){
  const newTheme = theme==='dark'?'light':'dark';
  const btn = document.getElementById('themeBtn');
  const rect = btn.getBoundingClientRect();
  const x = rect.left + rect.width  / 2;
  const y = rect.top  + rect.height / 2;
  const r = Math.hypot(
    Math.max(x, window.innerWidth  - x),
    Math.max(y, window.innerHeight - y)
  ) * 1.05; // slight overshoot so edge pixels are covered

  // Bounce the button
  btn.animate(
    [{transform:'scale(1)'},{transform:'scale(0.82)'},{transform:'scale(1.12)'},{transform:'scale(1)'}],
    {duration:420, easing:'cubic-bezier(0.34,1.56,0.64,1)'}
  );

  // Ripple overlay — colour of the destination theme
  const ripple = document.createElement('div');
  Object.assign(ripple.style,{
    position:'fixed', inset:'0', zIndex:'9999', pointerEvents:'none',
    background: newTheme==='dark'?'#08080f':'#f4f4f8',
    clipPath: `circle(0px at ${x}px ${y}px)`,
    willChange: 'clip-path, opacity',
    transform: 'translateZ(0)',
  });
  document.body.appendChild(ripple);

  // ── Phase 1: expand circle ────────────────────────────
  const expandAnim = ripple.animate([
    {clipPath:`circle(0px at ${x}px ${y}px)`},
    {clipPath:`circle(${r}px at ${x}px ${y}px)`}
  ],{
    duration: 620,
    easing: 'cubic-bezier(0.65, 0, 0.35, 1)', // smooth ease-in-out
    fill: 'forwards'
  });

  // Apply theme just before expand finishes (still covered — invisible swap)
  const applyAt = 560;
  setTimeout(()=> applyTheme(newTheme), applyAt);

  // ── Phase 2: fade ripple away, revealing new theme ────
  expandAnim.onfinish = () => {
    ripple.animate(
      [{opacity:1},{opacity:0}],
      {duration:480, easing:'cubic-bezier(0.4,0,0.2,1)', fill:'forwards'}
    ).onfinish = ()=> ripple.remove();
  };
}

const PACE_MIN=120,PACE_MAX=480; // 2:00 → 8:00 min/km
const KMH_MIN=7.5,KMH_MAX=30.0; // matches 2:00–8:00 min/km

// ═══ MATH HELPERS ═════════════════════════════
function pad2(n){return String(n).padStart(2,'0');}
function fmtPace(s){return`${Math.floor(s/60)}:${pad2(s%60)}`;}
function fmtKmh(v){return v.toFixed(1);}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.round(s%60);return h>0?`${h}:${pad2(m)}:${pad2(ss)}`:`${m}:${pad2(ss)}`;}

// ═══ DISPLAY ══════════════════════════════════
function bumpAnim(el,dir){el.classList.remove('bump','bump-down');void el.offsetWidth;el.classList.add(dir>0?'bump':'bump-down');setTimeout(()=>el.classList.remove('bump','bump-down'),200);}

function updateAll(dir=0){
  document.getElementById('paceNum').textContent=fmtPace(paceSec);
  const kd=document.getElementById('kmhDisplay');
  if(kd) kd.textContent=fmtKmh(kmh);
  if(dir!==0){
    bumpAnim(document.getElementById('paceNum'),dir);
    if(kd) bumpAnim(kd,dir);
  }
  const pp=(paceSec-PACE_MIN)/(PACE_MAX-PACE_MIN);
  document.getElementById('paceBar').style.width=(1-pp)*100+'%';
  ALL_DISTS.forEach(d=>{const el=document.getElementById('t_'+d.id);if(el)el.textContent=fmtTime(d.km*paceSec);});
}

function setPace(s,anim=1){const prev=paceSec;paceSec=Math.max(PACE_MIN,Math.min(PACE_MAX,Math.round(s)));kmh=Math.round((3600/paceSec)*10)/10;kmh=Math.max(KMH_MIN,Math.min(KMH_MAX,kmh));updateAll(anim?(paceSec<prev?1:-1):0);scheduleSave();}
function setKmh(v,anim=1){const prev=kmh;kmh=Math.max(KMH_MIN,Math.min(KMH_MAX,Math.round(v*10)/10));paceSec=Math.max(PACE_MIN,Math.min(PACE_MAX,Math.round(3600/kmh)));updateAll(anim?(kmh>prev?1:-1):0);scheduleSave();}
function adjustPace(d){setPace(paceSec+d);}
function adjustSpeed(d){setKmh(kmh+d);}

let pressTimer=null,pressType=null,dragMoved=false;

function startPress(type,e){
  dragMoved=false;pressType=type;
  pressTimer=setTimeout(()=>{if(!dragMoved)openInputModal(type);},550);
}
function cancelPress(){clearTimeout(pressTimer);pressTimer=null;}

function openInputModal(type){
  const t=T();
  const itEl=document.getElementById('inputType');
  itEl.className='pace'; // always pace mode now
  document.getElementById('inputLabel').textContent=t.inputPaceLabel;
  document.getElementById('inputHint').textContent=t.inputPaceHint;
  const field=document.getElementById('inputField');
  field.value=fmtPace(paceSec);
  field.setAttribute('inputmode','text');
  document.getElementById('inputOverlay').classList.add('show');
  setTimeout(()=>{field.focus();field.select();},150);
}

function applyInput(){
  const type=document.getElementById('inputType').className;
  const val=document.getElementById('inputField').value.trim();
  if(type==='pace'){
    // Parse M:SS or MM:SS
    const parts=val.split(':');
    if(parts.length===2){
      const m=parseInt(parts[0]),s=parseInt(parts[1]);
      if(!isNaN(m)&&!isNaN(s)&&s>=0&&s<60&&m>=0){
        closeSheet('inputOverlay');
        setPace(m*60+s);return;
      }
    }
  } else {
    const v=parseFloat(val.replace(',','.'));
    if(!isNaN(v)&&v>0){closeSheet('inputOverlay');setKmh(v);return;}
  }
  // Invalid
  document.getElementById('inputField').style.borderColor='var(--red)';
  showToast(T().invalidInput);
  setTimeout(()=>{document.getElementById('inputField').style.borderColor='';},1000);
}

// Allow Enter key to confirm
document.getElementById('inputField').addEventListener('keydown',e=>{if(e.key==='Enter')applyInput();});

// ═══ DRAG + LONG PRESS ════════════════════════
function makeDraggable(card,type,getVal,setVal,pxPerUnit){
  let sx=0,sv=0,drag=false;

  function onStart(x,isTouch){
    sx=x;sv=getVal();drag=false;
    startPress(type);
  }
  function onMove(x){
    const dx=Math.abs(x-sx);
    if(dx>6){dragMoved=true;cancelPress();}
    if(!dragMoved&&drag===false)drag=true;
    if(dragMoved){
      card.classList.add('dragging');
  
      setVal(sv+(x-sx)/pxPerUnit);
    }
  }
  function onEnd(){
    cancelPress();
    card.classList.remove('dragging','pressing');

    dragMoved=false;drag=false;
  }

  card.addEventListener('touchstart',e=>{
    if(e.target.closest('.adj-btn'))return;
    card.classList.add('pressing');
    onStart(e.touches[0].clientX,true);
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(e.target.closest('.adj-btn'))return;
    onMove(e.touches[0].clientX);
  },{passive:true});
  card.addEventListener('touchend',onEnd,{passive:true});
  card.addEventListener('touchcancel',onEnd,{passive:true});

  card.addEventListener('mousedown',e=>{
    if(e.target.closest('.adj-btn'))return;
    card.classList.add('pressing');
    onStart(e.clientX,false);
    const mm=ev=>{onMove(ev.clientX);};
    const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

makeDraggable(document.getElementById('paceCard'),'pace',()=>paceSec,v=>setPace(v,0),3);


// ═══ SHEET HELPERS ════════════════════════════
function openUserSheet(){buildUserSheet();document.getElementById('userOverlay').classList.add('show');}
function openDistSheet(){buildDistSheet();document.getElementById('distOverlay').classList.add('show');}
function closeSheet(id){document.getElementById(id).classList.remove('show');}
function overlayClick(id,e){if(e.target===document.getElementById(id))closeSheet(id);}

// ═══ TOAST ════════════════════════════════════
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}

// ═══ LOGO FALLBACK ═══════════════════════════
// If logo-light.png is missing, fall back to CSS-filter on logo.png
(()=>{
  const lightImg = document.querySelector('.logo-for-light');
  if(!lightImg) return;
  lightImg.addEventListener('error', () => {
    lightImg.style.display = 'none';
    const darkImg = document.querySelector('.logo-for-dark');
    if(darkImg){ darkImg.classList.add('fallback'); darkImg.style.display='block'; }
  });
})();

// ═══ INIT ═════════════════════════════════════
// Apply all restored state to DOM
applyTheme(theme,false);
applyLang(lang,false);   // also calls buildDistList + buildUserSheet
setPace(paceSec,false);
</script>
</body>
</html>
